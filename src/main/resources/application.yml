spring:
  application:
    name: ehr-core
  datasource:
    url: ${EHR_DB_URL:jdbc:postgresql://localhost:54328/ehr_core}
    username: ${EHR_DB_USERNAME:ehr_core}
    password: ${EHR_DB_PASSWORD:ehr_core_dev}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

ehr:
  security:
    dev-jwt-enabled: ${EHR_DEV_JWT_ENABLED:false}
    dev-jwt-secret: ${EHR_DEV_JWT_SECRET:}
    dev-login-password: ${EHR_DEV_LOGIN_PASSWORD:ehr-core-local-dev-login}

logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId:-none}]"
