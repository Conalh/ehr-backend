spring:
  application:
    name: ehr-core
  datasource:
    url: ${EHR_DB_URL:jdbc:postgresql://localhost:54328/ehr_core}
    username: ${EHR_DB_USERNAME:ehr_core}
    password: ${EHR_DB_PASSWORD:ehr_core_dev}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

ehr:
  security:
    dev-jwt-secret: ${EHR_DEV_JWT_SECRET:ehr-core-local-dev-jwt-secret-32-byte-minimum}

logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId:-none}]"
